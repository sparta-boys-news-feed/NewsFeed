spring:
  application:
    name: NewsFeed
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
jwt:
 secret: THIS_IS_AT_LEAST_32_BYTES_LONG_SECRET_1234_5678
 clock-skew-seconds: 60